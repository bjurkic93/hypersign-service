services:
  # ===================
  # BACKEND API
  # ===================
  hypersign-service:
    image: ghcr.io/bjurkic93/hypersign-service:latest
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=hypersign_db
      - DB_USERNAME=hypersign
      - DB_PASSWORD=${DATABASE_PASSWORD}
      - JWK_SET_URI=${JWK_SET_URI:-https://auth.reddia-x.com/.well-known/jwks.json}
      - CORS_ALLOWED_ORIGINS=https://hypersign.hyperbluex.com,https://hypersign-api.hyperbluex.com
      - STORAGE_PATH=/app/storage
      - FIREBASE_ENABLED=${FIREBASE_ENABLED:-false}
      - FIREBASE_CREDENTIALS_FILE=/app/config/firebase-service-account.json
    volumes:
      - media_storage:/app/storage
      - ${FIREBASE_CREDENTIALS_PATH:-./config}:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hypersign-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8088/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M

  # ===================
  # FRONTEND APP
  # ===================
  hypersign-frontend:
    image: ghcr.io/bjurkic93/hypersign-frontend:latest
    networks:
      - hypersign-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===================
  # REVERSE PROXY
  # ===================
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - hypersign-frontend
      - hypersign-service
    networks:
      - hypersign-network
    restart: unless-stopped

  # ===================
  # DATABASE
  # ===================
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=hypersign_db
      - POSTGRES_USER=hypersign
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hypersign -d hypersign_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hypersign-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  hypersign-network:
    driver: bridge

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  media_storage:
